    <linearGradient id="core" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#0b6f9f"/>
      <stop offset=".58" stop-color="#0b2238"/>
      <stop offset="1" stop-color="#07111f"/>
    </linearGradient>
    <filter id="shadow" x="-25%" y="-25%" width="150%" height="150%">
