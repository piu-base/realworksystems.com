<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 980 620" role="img" aria-labelledby="title desc">
  <title id="title">Real Work Systems transformation image</title>
  <desc id="desc">Bring in Missed customers, Too much admin, and Broken build. Through Real Work Systems. Get out Recover revenue leaks, Cut operating drag, and Free team capacity.</desc>
  <defs>
    <linearGradient id="panel" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#07111f" stop-opacity=".94"/>
      <stop offset=".52" stop-color="#0b1d31" stop-opacity=".96"/>
      <stop offset="1" stop-color="#14263a" stop-opacity=".95"/>
    </linearGradient>
    <radialGradient id="glow" cx=".5" cy=".48" r=".62">
      <stop offset="0" stop-color="#6fd0f4" stop-opacity=".34"/>
      <stop offset=".48" stop-color="#0b6f9f" stop-opacity=".12"/>
      <stop offset="1" stop-color="#0b6f9f" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="flow" x1="0" x2="1">
